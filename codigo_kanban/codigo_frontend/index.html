<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SaludOk CRM Pro</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1a1d27',
            surface2: '#22263a',
            border: '#2e3250',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0f1117; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2e3250; border-radius: 3px; }
    .card-drag { opacity: .4; transform: rotate(1deg); }
    .drop-zone { outline: 2px dashed #6366f1; background: rgba(99,102,241,.06); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; display:inline-block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn .2s ease; }
  </style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = 'http://localhost:3001/api';

// ─── API ─────────────────────────────────────────────────────────────────────
const api = {
  get: (path) => fetch(`${API}${path}`).then(r => r.json()),
  post: (path, body) => fetch(`${API}${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }).then(r => r.json()),
  put: (path, body) => fetch(`${API}${path}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }).then(r => r.json()),
  patch: (path, body) => fetch(`${API}${path}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }).then(r => r.json()),
  del: (path) => fetch(`${API}${path}`, { method:'DELETE' }).then(r => r.json()),
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const scoreColor = (s) => {
  if (s == null) return { bg: 'bg-gray-700', text: 'text-gray-400', border: 'border-gray-600', label: 'Sin score' };
  if (s >= 70) return { bg: 'bg-emerald-900/40', text: 'text-emerald-400', border: 'border-emerald-700', label: '★ '+Math.round(s) };
  if (s >= 45) return { bg: 'bg-amber-900/40',   text: 'text-amber-400',   border: 'border-amber-700',   label: '◆ '+Math.round(s) };
  return          { bg: 'bg-red-900/40',          text: 'text-red-400',     border: 'border-red-700',     label: '▼ '+Math.round(s) };
};

const daysInStage = (history) => {
  if (!history?.length) return null;
  const open = history.find(h => !h.exitedAt);
  if (!open) return null;
  const ms = Date.now() - new Date(open.enteredAt).getTime();
  return Math.max(0, Math.floor(ms / 86400000));
};

const fmtARS = (n) => n ? 'ARS ' + new Intl.NumberFormat('de-DE').format(Math.round(parseFloat(n))) : null;
const esc = (s) => s ?? '';

// ─── TOAST ───────────────────────────────────────────────────────────────────
let setToastGlobal = null;
function Toast() {
  const [toast, setToast] = useState(null);
  setToastGlobal = (msg, type='info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3200);
  };
  if (!toast) return null;
  const colors = { success:'border-emerald-600 text-emerald-300', error:'border-red-600 text-red-300', info:'border-indigo-600 text-indigo-300' };
  return (
    <div className={`fixed bottom-5 right-5 z-50 fade-in bg-surface border rounded-xl px-4 py-3 text-sm shadow-2xl ${colors[toast.type]||colors.info}`}>
      {toast.msg}
    </div>
  );
}
const toast = (msg, type) => setToastGlobal?.(msg, type);

// ─── ICONS (inline SVG) ───────────────────────────────────────────────────────
const Icon = ({ name, className='w-4 h-4' }) => {
  const icons = {
    plus: <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/>,
    x: <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/>,
    edit: <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>,
    trash: <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>,
    refresh: <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>,
    chevronDown: <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>,
    settings: <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>,
    user: <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>,
    ai: <path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>,
    clock: <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>,
    dollar: <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>,
    funnel: <path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>,
    move: <path strokeLinecap="round" strokeLinejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}>
      {icons[name]}
    </svg>
  );
};

// ─── MODAL WRAPPER ───────────────────────────────────────────────────────────
function Modal({ open, onClose, children, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"/>
      <div
        className={`relative bg-[#1a1d27] border border-[#2e3250] rounded-2xl shadow-2xl w-full max-h-[90vh] overflow-y-auto fade-in ${wide ? 'max-w-3xl' : 'max-w-md'}`}
        onClick={e => e.stopPropagation()}
      >
        {children}
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({ stats, loading }) {
  if (loading) return <div className="h-20 flex items-center justify-center text-gray-500 text-sm">Cargando métricas...</div>;
  if (!stats) return null;
  const items = [
    { label: 'Total Leads', value: stats.totalLeads, color: 'text-indigo-400' },
    { label: 'Score Promedio', value: stats.avgScore != null ? stats.avgScore : '—', color: 'text-amber-400' },
    { label: 'Valor Total Funnel', value: stats.totalValue ? fmtARS(stats.totalValue) : '—', color: 'text-emerald-400' },
    { label: 'Tasa de Cierre', value: stats.conversionRate != null ? stats.conversionRate + '%' : '—', color: 'text-purple-400' },
  ];
  return (
    <div className="flex gap-3 px-5 py-3 border-b border-[#2e3250] bg-[#1a1d27] overflow-x-auto">
      {items.map(it => (
        <div key={it.label} className="flex-shrink-0 bg-[#22263a] border border-[#2e3250] rounded-xl px-4 py-2 min-w-[120px]">
          <div className={`text-lg font-bold ${it.color}`}>{it.value}</div>
          <div className="text-xs text-gray-500 mt-0.5">{it.label}</div>
        </div>
      ))}
      {stats.byStage?.map(s => (
        <div key={s.stageId} className="flex-shrink-0 bg-[#22263a] border border-[#2e3250] rounded-xl px-3 py-2 min-w-[100px]">
          <div className="text-base font-bold text-gray-200">{s.count}</div>
          <div className="text-xs text-gray-500 truncate max-w-[90px]">{s.nombre}</div>
        </div>
      ))}
    </div>
  );
}

// ─── LEAD CARD ───────────────────────────────────────────────────────────────
function LeadCard({ lead, stages, onMove, onOpenModal, onReanalyze, dragging, onDragStart }) {
  const sc = scoreColor(lead.ai_score);
  const days = daysInStage(lead.history);
  const slaWarn = days != null && days > 3;

  return (
    <div
      id={`lead-${lead.id}`}
      draggable
      onDragStart={() => onDragStart(lead.id)}
      className={`bg-[#22263a] border border-[#2e3250] rounded-xl p-3 cursor-grab hover:border-indigo-500 hover:shadow-lg hover:shadow-indigo-900/20 transition-all group ${dragging ? 'card-drag' : ''}`}
    >
      {/* Top row */}
      <div className="flex items-start justify-between mb-2">
        <div className="flex-1 min-w-0">
          <div className="font-semibold text-gray-100 text-sm truncate">{lead.nombre}</div>
          <div className="text-xs text-gray-500 mt-0.5">{lead.edad}a · {lead.zona_residencia}</div>
        </div>
        <span className={`ml-2 flex-shrink-0 text-xs font-bold px-2 py-1 rounded-lg border ${sc.bg} ${sc.text} ${sc.border}`}>
          {sc.label}
        </span>
      </div>

      {/* Chips */}
      <div className="flex flex-wrap gap-1 mb-2">
        <span className="bg-[#1a1d27] border border-[#2e3250] text-gray-400 text-xs px-2 py-0.5 rounded-md">{lead.tipo_plan}</span>
        <span className="bg-[#1a1d27] border border-[#2e3250] text-gray-400 text-xs px-2 py-0.5 rounded-md">{lead.profesion}</span>
      </div>

      {/* Price */}
      {lead.ai_precio_sugerido && (
        <div className="text-xs text-emerald-400 font-semibold mb-2">
          {fmtARS(lead.ai_precio_sugerido)}/mes
        </div>
      )}

      {/* SLA */}
      {days != null && (
        <div className={`flex items-center gap-1 text-xs mb-2 ${slaWarn ? 'text-red-400' : 'text-gray-500'}`}>
          <Icon name="clock" className="w-3 h-3"/>
          {days === 0 ? 'Hoy' : `${days}d en este stage`}
          {slaWarn && <span className="ml-1 bg-red-900/40 border border-red-700 text-red-300 text-xs px-1.5 py-0.5 rounded">SLA</span>}
        </div>
      )}

      {/* Actions (visible on hover) */}
      <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-wrap">
        <button
          onClick={(e) => { e.stopPropagation(); onOpenModal(lead); }}
          className="flex-1 text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded-lg transition-colors"
        >
          Ver CRM
        </button>
        {!lead.ai_score && (
          <button
            onClick={(e) => { e.stopPropagation(); onReanalyze(lead.id); }}
            className="text-xs bg-[#1a1d27] hover:bg-[#2e3250] border border-[#2e3250] text-gray-400 px-2 py-1 rounded-lg transition-colors"
          >
            IA
          </button>
        )}
        {/* Quick move */}
        {stages.filter(s => s.id !== lead.stageId).slice(0, 2).map(s => (
          <button
            key={s.id}
            onClick={(e) => { e.stopPropagation(); onMove(lead.id, s.id); }}
            className="text-xs bg-[#1a1d27] hover:bg-[#2e3250] border border-[#2e3250] text-gray-400 px-2 py-1 rounded-lg transition-colors truncate max-w-[72px]"
            title={`Mover a ${s.nombre}`}
          >
            → {s.nombre}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── COLUMN ───────────────────────────────────────────────────────────────────
function Column({ stage, leads, stages, onMove, onOpenModal, onReanalyze, onAddLead, dragLeadId, onDragStart, onEditStage, onDeleteStage, funnelId }) {
  const [dragOver, setDragOver] = useState(false);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    if (dragLeadId && dragLeadId !== leads.find(l => l.id === dragLeadId)?.id) {
      onMove(dragLeadId, stage.id);
    } else if (dragLeadId) {
      onMove(dragLeadId, stage.id);
    }
  };

  const sorted = [...leads].sort((a, b) => (b.ai_score || 0) - (a.ai_score || 0));

  return (
    <div className="flex-shrink-0 w-72 flex flex-col gap-2">
      {/* Column header */}
      <div
        className="flex items-center justify-between px-3 py-2 rounded-xl border text-sm font-bold"
        style={{ background: stage.color + '22', borderColor: stage.color + '55', color: stage.color }}
      >
        <span className="truncate">{stage.nombre}</span>
        <div className="flex items-center gap-1 ml-2">
          <span className="text-xs bg-black/30 rounded-full px-2 py-0.5">{leads.length}</span>
          <button
            onClick={() => onEditStage(stage)}
            className="opacity-50 hover:opacity-100 transition-opacity p-0.5"
          >
            <Icon name="edit" className="w-3 h-3"/>
          </button>
          <button
            onClick={() => onDeleteStage(stage)}
            className="opacity-50 hover:opacity-100 transition-opacity p-0.5 text-red-400"
          >
            <Icon name="trash" className="w-3 h-3"/>
          </button>
        </div>
      </div>

      {/* Cards drop zone */}
      <div
        className={`flex flex-col gap-2 min-h-[80px] p-1 rounded-xl transition-all ${dragOver ? 'drop-zone' : ''}`}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
      >
        {sorted.map(lead => (
          <LeadCard
            key={lead.id}
            lead={lead}
            stages={stages}
            onMove={onMove}
            onOpenModal={onOpenModal}
            onReanalyze={onReanalyze}
            dragging={dragLeadId === lead.id}
            onDragStart={onDragStart}
          />
        ))}
        {leads.length === 0 && (
          <div className="text-center text-gray-600 text-xs py-5 border border-dashed border-[#2e3250] rounded-lg">
            Arrastra leads aquí
          </div>
        )}
      </div>

      {/* Add card button */}
      <button
        onClick={() => onAddLead(stage.id)}
        className="flex items-center gap-1 text-xs text-gray-600 hover:text-gray-400 px-2 py-1.5 rounded-lg hover:bg-[#22263a] transition-colors"
      >
        <Icon name="plus" className="w-3 h-3"/> Agregar Lead
      </button>
    </div>
  );
}

// ─── LEAD MODAL (CRM) ─────────────────────────────────────────────────────────
function LeadModal({ lead, stages, onClose, onMove, onSave, onReanalyze }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...lead });
  const [saving, setSaving] = useState(false);
  const [analyzing, setAnalyzing] = useState(false);
  const sc = scoreColor(lead.ai_score);
  const days = daysInStage(lead.history);

  const save = async () => {
    setSaving(true);
    await onSave(lead.id, form);
    setSaving(false);
    setEditing(false);
  };

  const reanalyze = async () => {
    setAnalyzing(true);
    await onReanalyze(lead.id);
    setAnalyzing(false);
  };

  const Field = ({ label, value, field, type='text' }) => (
    <div>
      <div className="text-xs text-gray-500 mb-1">{label}</div>
      {editing
        ? <input
            type={type}
            value={form[field] ?? ''}
            onChange={e => setForm(f => ({ ...f, [field]: e.target.value }))}
            className="w-full bg-[#0f1117] border border-[#2e3250] rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500"
          />
        : <div className="text-sm text-gray-200">{value || '—'}</div>
      }
    </div>
  );

  return (
    <div className="p-6">
      {/* Header */}
      <div className="flex items-start justify-between mb-5">
        <div>
          <h2 className="text-xl font-bold text-gray-100">{lead.nombre}</h2>
          <div className="text-sm text-gray-500">{lead.email} · {lead.telefono}</div>
        </div>
        <div className="flex items-center gap-2">
          <span className={`text-sm font-bold px-3 py-1 rounded-xl border ${sc.bg} ${sc.text} ${sc.border}`}>
            {sc.label}
          </span>
          <button onClick={onClose} className="text-gray-500 hover:text-gray-300 p-1">
            <Icon name="x"/>
          </button>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-4">
        {/* Left: Lead data */}
        <div className="col-span-2 space-y-4">
          {/* AI Panel */}
          <div className="bg-[#0f1117] border border-indigo-900/50 rounded-xl p-4">
            <div className="flex items-center gap-2 mb-3">
              <Icon name="ai" className="w-4 h-4 text-indigo-400"/>
              <span className="text-sm font-semibold text-indigo-400">Análisis IA</span>
              <button
                onClick={reanalyze}
                disabled={analyzing}
                className="ml-auto text-xs bg-indigo-900/50 hover:bg-indigo-800/50 border border-indigo-700 text-indigo-300 px-2 py-1 rounded-lg flex items-center gap-1"
              >
                {analyzing ? <span className="spin">↺</span> : <Icon name="refresh" className="w-3 h-3"/>}
                {analyzing ? 'Analizando...' : 'Re-analizar'}
              </button>
            </div>
            {lead.ai_analysis
              ? <p className="text-sm text-gray-300 leading-relaxed">{lead.ai_analysis}</p>
              : <p className="text-sm text-gray-500 italic">Sin análisis. Haz click en Re-analizar.</p>
            }
            {lead.ai_precio_sugerido && (
              <div className="flex items-center gap-2 mt-3 pt-3 border-t border-[#2e3250]">
                <Icon name="dollar" className="w-4 h-4 text-emerald-400"/>
                <span className="text-emerald-400 font-bold">{fmtARS(lead.ai_precio_sugerido)}/mes sugerido</span>
              </div>
            )}
          </div>

          {/* Lead fields */}
          <div className="grid grid-cols-2 gap-3">
            <Field label="Email" value={lead.email} field="email"/>
            <Field label="Teléfono" value={lead.telefono} field="telefono"/>
            <Field label="Edad" value={lead.edad} field="edad" type="number"/>
            <Field label="Estado Civil" value={lead.estado_civil} field="estado_civil"/>
            <Field label="Hijos" value={lead.hijos} field="hijos" type="number"/>
            <Field label="Profesión" value={lead.profesion} field="profesion"/>
            <Field label="Ingresos/mes" value={fmtARS(lead.ingresos_mensuales)} field="ingresos_mensuales" type="number"/>
            <Field label="Zona" value={lead.zona_residencia} field="zona_residencia"/>
            <Field label="Tipo de Plan" value={lead.tipo_plan} field="tipo_plan"/>
          </div>

          {/* Actions */}
          <div className="flex gap-2">
            {editing
              ? <>
                  <button onClick={save} disabled={saving} className="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg flex items-center gap-1">
                    {saving ? <span className="spin">↺</span> : null} Guardar
                  </button>
                  <button onClick={() => { setEditing(false); setForm({...lead}); }} className="bg-[#22263a] border border-[#2e3250] text-gray-400 text-sm px-4 py-2 rounded-lg">
                    Cancelar
                  </button>
                </>
              : <button onClick={() => setEditing(true)} className="flex items-center gap-1 bg-[#22263a] border border-[#2e3250] text-gray-300 text-sm px-4 py-2 rounded-lg hover:border-indigo-500">
                  <Icon name="edit" className="w-3.5 h-3.5"/> Editar
                </button>
            }
          </div>
        </div>

        {/* Right: Timeline + Move */}
        <div className="space-y-4">
          {/* Move stage */}
          <div className="bg-[#0f1117] border border-[#2e3250] rounded-xl p-3">
            <div className="flex items-center gap-2 mb-2">
              <Icon name="move" className="w-3.5 h-3.5 text-gray-500"/>
              <span className="text-xs font-semibold text-gray-400">Mover Stage</span>
            </div>
            <div className="flex flex-col gap-1">
              {stages.map(s => (
                <button
                  key={s.id}
                  onClick={() => onMove(lead.id, s.id)}
                  className={`text-left text-xs px-2 py-1.5 rounded-lg border transition-colors ${
                    s.id === lead.stageId
                      ? 'border-indigo-600 bg-indigo-900/30 text-indigo-300 cursor-default'
                      : 'border-[#2e3250] hover:border-indigo-500 text-gray-400 hover:text-gray-200'
                  }`}
                  disabled={s.id === lead.stageId}
                >
                  {s.id === lead.stageId ? '● ' : '○ '}{s.nombre}
                </button>
              ))}
            </div>
          </div>

          {/* Timeline SLA */}
          <div className="bg-[#0f1117] border border-[#2e3250] rounded-xl p-3">
            <div className="flex items-center gap-2 mb-2">
              <Icon name="clock" className="w-3.5 h-3.5 text-gray-500"/>
              <span className="text-xs font-semibold text-gray-400">Timeline</span>
            </div>
            {days != null && (
              <div className={`text-sm font-bold mb-3 ${days > 3 ? 'text-red-400' : 'text-gray-300'}`}>
                {days}d en stage actual {days > 3 && <span className="text-xs ml-1 bg-red-900/30 border border-red-700 px-1.5 py-0.5 rounded text-red-400">SLA!</span>}
              </div>
            )}
            <div className="space-y-2">
              {(lead.history || []).map((h, i) => (
                <div key={h.id} className="flex gap-2 items-start">
                  <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${i === 0 ? 'bg-indigo-400' : 'bg-gray-600'}`}/>
                  <div>
                    <div className="text-xs text-gray-300 font-medium">{h.stageName}</div>
                    <div className="text-xs text-gray-600">
                      {new Date(h.enteredAt).toLocaleDateString('es-AR')}
                      {h.durationMin && ` · ${Math.round(h.durationMin/1440)}d`}
                    </div>
                  </div>
                </div>
              ))}
              {!lead.history?.length && <div className="text-xs text-gray-600">Sin historial</div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── NEW LEAD FORM ────────────────────────────────────────────────────────────
function NewLeadForm({ funnels, defaultFunnelId, defaultStageId, onClose, onCreated }) {
  const [form, setForm] = useState({
    nombre:'', email:'', telefono:'', edad:'', tipo_plan:'Plan Individual',
    estado_civil:'Soltero/a', hijos:'0', ingresos_mensuales:'',
    profesion:'', zona_residencia:'', funnelId: defaultFunnelId||'', stageId: defaultStageId||''
  });
  const [loading, setLoading] = useState(false);

  const activeFunnel = funnels.find(f => f.id === parseInt(form.funnelId));

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    try {
      const res = await api.post('/leads', form);
      if (res.success) {
        toast('Lead creado · Score: ' + (res.ai_score ?? '—'), 'success');
        onCreated(res.data);
        onClose();
      } else {
        toast('Error: ' + res.error, 'error');
      }
    } catch { toast('Error de conexión', 'error'); }
    finally { setLoading(false); }
  };

  const inp = (label, field, opts={}) => (
    <div>
      <label className="text-xs text-gray-500 block mb-1">{label}</label>
      {opts.select
        ? <select value={form[field]} onChange={e => set(field, e.target.value)}
            className="w-full bg-[#0f1117] border border-[#2e3250] rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
            {opts.options.map(o => <option key={o}>{o}</option>)}
          </select>
        : <input
            type={opts.type||'text'} value={form[field]} required={opts.required}
            onChange={e => set(field, e.target.value)}
            placeholder={opts.placeholder||''}
            className="w-full bg-[#0f1117] border border-[#2e3250] rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500"
          />
      }
    </div>
  );

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-5">
        <h2 className="text-lg font-bold text-gray-100">Nuevo Lead</h2>
        <button onClick={onClose} className="text-gray-500 hover:text-gray-300 p-1"><Icon name="x"/></button>
      </div>
      <form onSubmit={submit}>
        {/* Funnel/Stage */}
        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label className="text-xs text-gray-500 block mb-1">Embudo</label>
            <select value={form.funnelId} onChange={e => set('funnelId', e.target.value)}
              className="w-full bg-[#0f1117] border border-[#2e3250] rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
              <option value="">Sin embudo</option>
              {funnels.map(f => <option key={f.id} value={f.id}>{f.nombre}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs text-gray-500 block mb-1">Stage inicial</label>
            <select value={form.stageId} onChange={e => set('stageId', e.target.value)}
              className="w-full bg-[#0f1117] border border-[#2e3250] rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
              <option value="">Auto (primero)</option>
              {activeFunnel?.stages?.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
            </select>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3">
          {inp('Nombre *', 'nombre', { required: true })}
          {inp('Email *', 'email', { required: true, type:'email' })}
          {inp('Teléfono', 'telefono')}
          {inp('Edad', 'edad', { type:'number', required: true })}
          {inp('Estado Civil', 'estado_civil', { select:true, options:['Soltero/a','Casado/a','Divorciado/a','Viudo/a','Unión de hecho'] })}
          {inp('Hijos', 'hijos', { type:'number' })}
          {inp('Profesión *', 'profesion', { required: true })}
          {inp('Ingresos/mes (ARS) *', 'ingresos_mensuales', { required: true, type:'number', placeholder:'350000' })}
          {inp('Zona de residencia *', 'zona_residencia', { required: true })}
          {inp('Tipo de Plan', 'tipo_plan', { select:true, options:['Plan Individual','Plan Familiar','Plan Empresarial','Plan Senior','Plan Premium'] })}
        </div>

        <div className="flex gap-2 mt-5">
          <button type="button" onClick={onClose}
            className="flex-1 bg-[#22263a] border border-[#2e3250] text-gray-400 text-sm px-4 py-2 rounded-lg">
            Cancelar
          </button>
          <button type="submit" disabled={loading}
            className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg font-medium flex items-center justify-center gap-2">
            {loading ? <><span className="spin">↺</span> Analizando...</> : 'Crear y Analizar con IA'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [funnels, setFunnels] = useState([]);
  const [currentFunnelId, setCurrentFunnelId] = useState(null);
  const [leads, setLeads] = useState([]);
  const [stats, setStats] = useState(null);
  const [statsLoading, setStatsLoading] = useState(false);
  const [loading, setLoading] = useState(true);
  const [dragLeadId, setDragLeadId] = useState(null);

  // Modals
  const [modalLead, setModalLead] = useState(null);
  const [showFunnelMgr, setShowFunnelMgr] = useState(false);
  const [showNewLead, setShowNewLead] = useState(false);
  const [newLeadStageId, setNewLeadStageId] = useState(null);
  const [editStage, setEditStage] = useState(null);
  const [showFunnelDropdown, setShowFunnelDropdown] = useState(false);

  const currentFunnel = funnels.find(f => f.id === currentFunnelId);

  // ── Load ────────────────────────────────────────────────────────────────────
  const loadFunnels = useCallback(async () => {
    const res = await api.get('/funnels');
    if (res.success) {
      setFunnels(res.data);
      if (!currentFunnelId && res.data.length > 0) {
        setCurrentFunnelId(res.data[0].id);
      }
    }
  }, [currentFunnelId]);

  const loadLeads = useCallback(async (funnelId) => {
    if (!funnelId) return;
    const res = await api.get(`/leads?funnelId=${funnelId}`);
    if (res.success) setLeads(res.data);
  }, []);

  const loadStats = useCallback(async (funnelId) => {
    if (!funnelId) return;
    setStatsLoading(true);
    const res = await api.get(`/funnels/${funnelId}/stats`);
    if (res.success) setStats(res.data);
    setStatsLoading(false);
  }, []);

  useEffect(() => {
    loadFunnels().finally(() => setLoading(false));
  }, []);

  useEffect(() => {
    if (currentFunnelId) {
      loadLeads(currentFunnelId);
      loadStats(currentFunnelId);
    }
  }, [currentFunnelId]);

  const refreshAll = () => {
    loadFunnels();
    if (currentFunnelId) { loadLeads(currentFunnelId); loadStats(currentFunnelId); }
  };

  // ── Actions ─────────────────────────────────────────────────────────────────
  const moveLead = async (leadId, stageId) => {
    const res = await api.patch(`/leads/${leadId}/stage`, { stageId });
    if (res.success) {
      setLeads(ls => ls.map(l => l.id === leadId ? res.data : l));
      if (modalLead?.id === leadId) setModalLead(res.data);
      loadStats(currentFunnelId);
      toast('Movido correctamente', 'success');
    } else {
      toast('Error al mover: ' + res.error, 'error');
    }
  };

  const reanalyze = async (leadId) => {
    const res = await api.post(`/leads/${leadId}/reanalizar`, {});
    if (res.success) {
      setLeads(ls => ls.map(l => l.id === leadId ? res.data : l));
      if (modalLead?.id === leadId) setModalLead(res.data);
      loadStats(currentFunnelId);
      toast(`Re-análisis completado · Score: ${res.data.ai_score ?? '—'}`, 'success');
    } else {
      toast('Error en análisis IA', 'error');
    }
  };

  const saveLead = async (leadId, data) => {
    const res = await api.put(`/leads/${leadId}`, data);
    if (res.success) {
      setLeads(ls => ls.map(l => l.id === leadId ? { ...l, ...res.data } : l));
      if (modalLead?.id === leadId) setModalLead(res.data);
      toast('Guardado', 'success');
    } else toast('Error al guardar', 'error');
  };

  // Funnels
  const createFunnel = async (nombre, descripcion) => {
    const res = await api.post('/funnels', { nombre, descripcion });
    if (res.success) {
      await loadFunnels();
      setCurrentFunnelId(res.data.id);
      toast(`Embudo "${nombre}" creado`, 'success');
    } else toast('Error: ' + res.error, 'error');
  };

  const deleteFunnel = async (id) => {
    if (!confirm('¿Eliminar este embudo? Los leads serán desvinculados.')) return;
    const res = await api.del(`/funnels/${id}`);
    if (res.success) {
      await loadFunnels();
      if (currentFunnelId === id) setCurrentFunnelId(funnels.find(f => f.id !== id)?.id ?? null);
      toast('Embudo eliminado', 'success');
    } else toast('Error: ' + res.error, 'error');
  };

  // Stages
  const addStage = async (funnelId, nombre, color) => {
    const res = await api.post(`/funnels/${funnelId}/stages`, { nombre, color });
    if (res.success) { await loadFunnels(); toast('Columna agregada', 'success'); }
    else toast('Error: ' + res.error, 'error');
  };

  const saveEditStage = async (stage, nombre, color) => {
    const res = await api.patch(`/funnels/${stage.funnelId}/stages/${stage.id}`, { nombre, color });
    if (res.success) { await loadFunnels(); setEditStage(null); toast('Columna actualizada', 'success'); }
    else toast('Error: ' + res.error, 'error');
  };

  const deleteStage = async (stage) => {
    const res = await api.del(`/funnels/${stage.funnelId}/stages/${stage.id}`);
    if (res.success) { await loadFunnels(); toast('Columna eliminada', 'success'); }
    else toast('Error: ' + res.error, 'error');
  };

  // ── Render ──────────────────────────────────────────────────────────────────
  const stages = currentFunnel?.stages || [];
  const stageLeads = (stageId) => leads.filter(l => l.stageId === stageId);

  if (loading) return (
    <div className="min-h-screen flex items-center justify-center text-gray-400">
      <span className="spin text-2xl mr-3">↺</span> Cargando...
    </div>
  );

  return (
    <div className="flex flex-col h-screen overflow-hidden text-gray-200">
      {/* HEADER */}
      <header className="flex items-center justify-between px-5 py-3 bg-[#1a1d27] border-b border-[#2e3250] flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="font-bold text-base text-gray-100">
            <span className="text-indigo-400">SaludOk</span> CRM
          </div>

          {/* Funnel selector */}
          <div className="relative">
            <button
              onClick={() => setShowFunnelDropdown(d => !d)}
              className="flex items-center gap-1.5 bg-[#22263a] border border-[#2e3250] rounded-xl px-3 py-1.5 text-sm hover:border-indigo-500 transition-colors"
            >
              <Icon name="funnel" className="w-3.5 h-3.5 text-indigo-400"/>
              <span className="max-w-[160px] truncate">{currentFunnel?.nombre ?? 'Sin embudo'}</span>
              <Icon name="chevronDown" className="w-3 h-3 text-gray-500"/>
            </button>
            {showFunnelDropdown && (
              <div className="absolute top-full left-0 mt-1 bg-[#1a1d27] border border-[#2e3250] rounded-xl shadow-2xl z-30 min-w-[200px] py-1 fade-in">
                {funnels.map(f => (
                  <button
                    key={f.id}
                    onClick={() => { setCurrentFunnelId(f.id); setShowFunnelDropdown(false); }}
                    className={`w-full text-left px-3 py-2 text-sm hover:bg-[#22263a] transition-colors ${f.id === currentFunnelId ? 'text-indigo-400' : 'text-gray-300'}`}
                  >
                    {f.nombre}
                    <span className="ml-2 text-xs text-gray-600">{f._count?.leads ?? 0}</span>
                  </button>
                ))}
                {!funnels.length && <div className="px-3 py-2 text-sm text-gray-500">Sin embudos</div>}
              </div>
            )}
          </div>
        </div>

        <div className="flex items-center gap-2">
          <button onClick={refreshAll} className="p-1.5 text-gray-500 hover:text-gray-300 transition-colors">
            <Icon name="refresh" className="w-4 h-4"/>
          </button>
          <button
            onClick={() => setShowFunnelMgr(true)}
            className="flex items-center gap-1.5 bg-[#22263a] border border-[#2e3250] hover:border-indigo-500 text-gray-300 text-sm px-3 py-1.5 rounded-xl transition-colors"
          >
            <Icon name="settings" className="w-3.5 h-3.5"/> Embudos
          </button>
          <button
            onClick={() => { setNewLeadStageId(null); setShowNewLead(true); }}
            disabled={!currentFunnelId}
            className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white text-sm px-3 py-1.5 rounded-xl font-medium transition-colors"
          >
            <Icon name="plus" className="w-3.5 h-3.5"/> Nuevo Lead
          </button>
        </div>
      </header>

      {/* DASHBOARD */}
      <Dashboard stats={stats} loading={statsLoading}/>

      {/* BOARD */}
      {currentFunnelId ? (
        <div className="flex-1 overflow-x-auto overflow-y-hidden">
          <div
            className="flex gap-4 p-5 h-full"
            style={{ minWidth: Math.max(stages.length * 304, 600) + 'px' }}
          >
            {stages.map(stage => (
              <Column
                key={stage.id}
                stage={stage}
                leads={stageLeads(stage.id)}
                stages={stages}
                onMove={moveLead}
                onOpenModal={setModalLead}
                onReanalyze={reanalyze}
                onAddLead={(stageId) => { setNewLeadStageId(stageId); setShowNewLead(true); }}
                dragLeadId={dragLeadId}
                onDragStart={setDragLeadId}
                onEditStage={setEditStage}
                onDeleteStage={deleteStage}
                funnelId={currentFunnelId}
              />
            ))}

            {/* Add column button */}
            <div className="flex-shrink-0 w-60 flex flex-col gap-2">
              <button
                onClick={() => setShowFunnelMgr(true)}
                className="flex items-center gap-2 px-4 py-3 border-2 border-dashed border-[#2e3250] rounded-xl text-gray-600 hover:text-gray-400 hover:border-indigo-700 transition-colors text-sm"
              >
                <Icon name="plus" className="w-4 h-4"/> Agregar columna
              </button>
            </div>
          </div>
        </div>
      ) : (
        <div className="flex-1 flex flex-col items-center justify-center text-center gap-4">
          <Icon name="funnel" className="w-12 h-12 text-gray-700"/>
          <div className="text-gray-500 text-lg font-medium">No hay embudos</div>
          <div className="text-gray-600 text-sm">Crea tu primer embudo para comenzar</div>
          <button
            onClick={() => setShowFunnelMgr(true)}
            className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-medium"
          >
            Crear Embudo
          </button>
        </div>
      )}

      {/* MODALS */}
      <Modal open={!!modalLead} onClose={() => setModalLead(null)} wide>
        {modalLead && (
          <LeadModal
            lead={modalLead}
            stages={stages}
            onClose={() => setModalLead(null)}
            onMove={moveLead}
            onSave={saveLead}
            onReanalyze={reanalyze}
          />
        )}
      </Modal>

      <Modal open={showFunnelMgr} onClose={() => setShowFunnelMgr(false)} wide>
        {showFunnelMgr && (
          <FunnelManager
            funnels={funnels}
            onClose={() => setShowFunnelMgr(false)}
            onCreate={createFunnel}
            onDelete={deleteFunnel}
            onAddStage={addStage}
            onEditStage={setEditStage}
            onDeleteStage={deleteStage}
          />
        )}
      </Modal>

      <Modal open={showNewLead} onClose={() => setShowNewLead(false)}>
        {showNewLead && (
          <NewLeadForm
            funnels={funnels}
            defaultFunnelId={currentFunnelId}
            defaultStageId={newLeadStageId}
            onClose={() => setShowNewLead(false)}
            onCreated={(lead) => {
              setLeads(ls => [lead, ...ls]);
              loadStats(currentFunnelId);
            }}
          />
        )}
      </Modal>

      <Modal open={!!editStage} onClose={() => setEditStage(null)}>
        {editStage && (
          <EditStageModal
            stage={editStage}
            onClose={() => setEditStage(null)}
            onSave={saveEditStage}
          />
        )}
      </Modal>

      <Toast/>

      {/* Close dropdown on outside click */}
      {showFunnelDropdown && (
        <div className="fixed inset-0 z-20" onClick={() => setShowFunnelDropdown(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
