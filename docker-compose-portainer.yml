x-kanbancw-config: &kanbancw-config
  KANBANCW_DOMAIN: kanban.saludok.com.ar
  CHATWOOT_DOMAIN: multichat.saludok.com.ar
  KANBANCW_URL: https://kanban.saludok.com.ar
  CHATWOOT_API_URL: https://multichat.saludok.com.ar
  CORS_ORIGIN: https://kanban.saludok.com.ar,https://multichat.saludok.com.ar
  EVOLUTION_API_URL: https://evoapi.saludok.com.ar
  EVOLUTION_API_KEY: b6bbb9dfbba379e37eb1e7afd26c9697

# ============================================

services:

  postgres-kanban:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kanbancw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Saludok2026
    volumes:
      - kanbancw-postgres:/var/lib/postgresql/data
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  backend:
    image: kanbancw-backend:2.0.0
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:Saludok2026@postgres-kanban:5432/kanbancw?schema=public
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: "172.18.0.1"
      REDIS_PORT: "6379"
      <<: *kanbancw-config
    volumes:
      - kanbancw-uploads:/app/uploads
    depends_on:
      - postgres-kanban
    networks:
      - network_public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.kanbancw-backend.rule=Host(`kanban.saludok.com.ar`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/health`) || PathPrefix(`/socket.io`) || PathPrefix(`/dashboard-script`))"
        - "traefik.http.routers.kanbancw-backend.entrypoints=websecure"
        - "traefik.http.routers.kanbancw-backend.tls=true"
        - "traefik.http.routers.kanbancw-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.kanbancw-backend.loadbalancer.server.port=3000"
        - "traefik.docker.network=network_public"

  frontend:
    image: saludok-frontend:1.0
    environment:
      KANBANCW_DOMAIN: kanban.saludok.com.ar
    networks:
      - network_public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.kanbancw-frontend.rule=Host(`kanban.saludok.com.ar`)"
        - "traefik.http.routers.kanbancw-frontend.entrypoints=websecure"
        - "traefik.http.routers.kanbancw-frontend.tls=true"
        - "traefik.http.routers.kanbancw-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.kanbancw-frontend.loadbalancer.server.port=80"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.kanbancw-frontend.priority=1"

volumes:
  kanbancw-uploads:
    external: true
    name: kanbancw-uploads
  kanbancw-postgres:
    external: true
    name: kanbancw-postgres

networks:
  network_public:
    external: true
    name: network_public
