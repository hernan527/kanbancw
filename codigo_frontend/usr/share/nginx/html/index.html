<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban - Chatwoot</title>
    <!-- Anti-flash: aplica tema correto ANTES do React carregar -->
    <style>
      html { background-color: #121213; color-scheme: dark; }
    </style>
    <script>
      (function() {
        try {
          // Prioridade: URL param > localStorage > dark (default)
          var urlParams = new URLSearchParams(window.location.search);
          var urlTheme = urlParams.get('theme');
          var saved = localStorage.getItem('kanbancw-theme');
          var theme = (urlTheme === 'light' || urlTheme === 'dark') ? urlTheme
                    : (saved === 'light' || saved === 'dark') ? saved
                    : 'dark';

          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
            document.documentElement.style.backgroundColor = '#ffffff';
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
            document.documentElement.style.setProperty('background-color', '#121213', 'important');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-BJXxQsb6.js"></script>
    <script>
    (function() {
      // Captura los headers de auth de las llamadas que ya hace el frontend
      var _capturedHeaders = { 'Content-Type': 'application/json' };
      var _origFetch = window.fetch;

      window.fetch = function(url, opts) {
        // Capturar headers de cualquier llamada a la API para reutilizarlos
        if (typeof url === 'string' && url.includes('/api/') && opts && opts.headers) {
          var h = opts.headers;
          ['access-token','token-type','client','uid','Authorization','api_access_token'].forEach(function(k) {
            if (h[k]) _capturedHeaders[k] = h[k];
          });
        }

        var p = _origFetch.apply(this, arguments);

        // Interceptar respuesta del move de card
        if (typeof url === 'string' && /\/api\/kanban\/\d+\/move(-to-stage)?$/.test(url) && opts && opts.method === 'PATCH') {
          return p.then(function(res) {
            var clone = res.clone();
            clone.json().then(function(data) {
              if (data && data.pendingMessage) {
                showMessageModal(data.conversationId, data.pendingMessage, url);
              }
            }).catch(function(){});
            return res;
          });
        }
        return p;
      };

      function showMessageModal(conversationId, message, originUrl) {
        var old = document.getElementById('_kcw_msg_modal');
        if (old) old.remove();

        var isDark = document.documentElement.classList.contains('dark');
        var bg = isDark ? '#1e1e1f' : '#ffffff';
        var border = isDark ? '#3f3f46' : '#e4e4e7';
        var textColor = isDark ? '#f4f4f5' : '#18181b';
        var labelColor = isDark ? '#a1a1aa' : '#52525b';
        var inputBg = isDark ? '#2a2a2b' : '#f9f9f9';
        var overlay = isDark ? 'rgba(0,0,0,0.7)' : 'rgba(0,0,0,0.4)';

        // Extraer base URL de la llamada original
        var base = '';
        try { base = new URL(originUrl, location.href).origin === location.origin ? '' : new URL(originUrl).origin; } catch(e) {}

        var modal = document.createElement('div');
        modal.id = '_kcw_msg_modal';
        modal.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:' + overlay;

        modal.innerHTML =
          '<div style="background:' + bg + ';border:1px solid ' + border + ';border-radius:12px;padding:24px;width:460px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.4);">' +
            '<h3 style="margin:0 0 6px;font-size:16px;font-weight:600;color:' + textColor + ';">Enviar mensaje al cliente</h3>' +
            '<p style="margin:0 0 14px;font-size:13px;color:' + labelColor + ';">Revisá y editá el mensaje antes de enviarlo.</p>' +
            '<textarea id="_kcw_msg_text" style="width:100%;box-sizing:border-box;min-height:100px;padding:10px 12px;border-radius:8px;border:1px solid ' + border + ';background:' + inputBg + ';color:' + textColor + ';font-size:14px;resize:vertical;font-family:inherit;outline:none;">' + escHtml(message) + '</textarea>' +
            '<div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end;">' +
              '<button id="_kcw_msg_cancel" style="padding:8px 18px;border-radius:8px;border:1px solid ' + border + ';background:transparent;color:' + textColor + ';font-size:14px;cursor:pointer;">No enviar</button>' +
              '<button id="_kcw_msg_send" style="padding:8px 18px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer;font-weight:500;">Enviar</button>' +
            '</div>' +
          '</div>';

        document.body.appendChild(modal);

        document.getElementById('_kcw_msg_cancel').onclick = function() { modal.remove(); };
        modal.onclick = function(e) { if (e.target === modal) modal.remove(); };

        document.getElementById('_kcw_msg_send').onclick = function() {
          var txt = document.getElementById('_kcw_msg_text').value.trim();
          if (!txt) return;
          var btn = document.getElementById('_kcw_msg_send');
          btn.disabled = true;
          btn.textContent = 'Enviando...';

          _origFetch(base + '/api/kanban/' + conversationId + '/send-message', {
            method: 'POST',
            headers: _capturedHeaders,
            body: JSON.stringify({ message: txt })
          }).then(function(r) {
            modal.remove();
            if (!r.ok) console.error('Error al enviar mensaje al cliente');
          }).catch(function(e) {
            modal.remove();
            console.error('Error al enviar mensaje', e);
          });
        };
      }

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    })();
    </script>
    <link rel="stylesheet" crossorigin href="/assets/index-CXtuWbYA.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Config gerado em runtime pelo Nginx -->
    <script src="/config.js"></script>
  </body>
</html>
